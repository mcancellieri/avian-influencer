<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>90s Phone Box Bird Net</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
<div class="phone-casing">
    <header class="phone-header">
        <div class="brand">ARTBOX-COMM v0.1</div>
        <div class="coin-return"></div>
    </header>

    <div class="coin-slot-unit">
        <div class="slot"></div>
    </div>

    <section id="main-display" class="display-area">
        <div class="pigeon-box">
                <pre id="tape-reels" class="ascii-art">
      ___
     (o o)
    (  V  )
    /-- --\
   /       \
   ^^^^ ^^^^
                </pre>
        </div>

        <div id="story-display" class="story-panel hidden">
            <div class="story-content">
                <div id="bird-image" class="bird-avatar"></div>
                <p id="story-text"></p>
                <div class="audio-controls">
                    <div class="playback-bar">
                        <div id="progress" class="progress-fill"></div>
                    </div>
                    <span id="time-display">0:00</span>
                </div>
                <button id="close-story">END CALL</button>
            </div>
        </div>
    </section>

    <nav class="keypad-container">
        <button class="phone-button" data-key="1">
            <span class="btn-num">1</span>
            <pre class="btn-art">
  _
 (")
/(_)\
 ^ ^
                </pre>
            <span class="btn-label">TODO</span>
        </button>
        <button class="phone-button" data-key="2">
            <span class="btn-num">2</span>
            <pre class="btn-art">
 {o,o}
 /)_)
  " "
                </pre>
            <span class="btn-label">GET INTO HUMAN WATCHING</span>
        </button>
        <button class="phone-button" data-key="3">
            <span class="btn-num">3</span>
            <pre class="btn-art">
  __
 <' )
  ( \/
   ""
                </pre>
            <span class="btn-label">EGG TIMER</span>
        </button>
        <button class="phone-button" data-key="4">
            <span class="btn-num">4</span>
            <pre class="btn-art">
  🐣
 (")
 < >
                </pre>
            <span class="btn-label">BIRD-XILOPHONE</span>
        </button>
        <button class="phone-button" data-key="5">
            <span class="btn-num">5</span>
            <pre class="btn-art">
 __
(  \___
 )   _ \
(_____)
                </pre>
            <span class="btn-label">TODO</span>
        </button>
        <button class="phone-button" data-key="6">
            <span class="btn-num">6</span>
            <pre class="btn-art">
 \  /
  \/
 /||\
                </pre>
            <span class="btn-label">TODO</span>
        </button>
        <button class="phone-button" data-key="7">
            <span class="btn-num">7</span>
            <pre class="btn-art">
 \W/
 (")
 / \
                </pre>
            <span class="btn-label">TODO</span>
        </button>
        <button class="phone-button" data-key="8">
            <span class="btn-num">8</span>
            <pre class="btn-art">
  _
 (">
 / )
 m m
                </pre>
            <span class="btn-label">TODO</span>
        </button>
        <button class="phone-button" data-key="9">
            <span class="btn-num">9</span>
            <pre class="btn-art">
  ?
 / \
 ? ?
                </pre>
            <span class="btn-label">AVIAN INFLUENZA</span>
        </button>
        <button class="phone-button" data-key="*">
            <span class="btn-num">*</span>
        </button>
        <button class="phone-button" data-key="0">
            <span class="btn-num">0</span>
            <span class="btn-label">OPERATOR</span>
        </button>
        <button class="phone-button" data-key="#">
            <span class="btn-num">#</span>
        </button>
    </nav>

    <footer class="phone-footer">
    </footer>
</div>
<audio id="audio-player"></audio>
<script type="module" src="./index.js"></script>
</body>
</html>
